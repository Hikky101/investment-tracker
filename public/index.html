<style>

@keyframes slide-open{from{opacity:0;max-height:0;padding-top:0;padding-bottom:0}to{opacity:1;max-height:900px}}
@keyframes ring-pulse{0%{box-shadow:0 0 0 0 var(--ring)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* Tab bar */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:0 16px 14px;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;min-width:56px;text-align:center;transition:all .2s}

.day-card{margin:0 12px 8px;border-radius:var(--radius);border:1px solid var(--bd);overflow:hidden;transition:all .35s;position:relative}

.task-row{display:flex;align-items:flex-start;gap:12px;padding:11px 8px;cursor:pointer;user-select:none;border-radius:10px;transition:background .15s}
.task-row:active{background:var(--bg2)}

.checkbox.checked{border:none}
.checkbox.checked svg{animation:check-burst .25s ease}
.task-text{font-size:13.5px;line-height:1.65;transition:all .3s}
.task-text.done{color:var(--tx3);text-decoration:line-through}
.next-btn{width:100%;margin-top:8px;padding:13px;border-radius:12px;border:1.5px dashed;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;transition:all .2s}
.next-btn:active{transform:scale(.98)}

.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.menu-overlay.open{opacity:1;pointer-events:auto}

/* ═══════════════════════════════════════════════════
   DATABASE MODULE — IndexedDB wrapper
   ═══════════════════════════════════════════════════ */
const DB_NAME = 'InvestTracker';
const DB_VERSION = 1;
const STORE = 'appState';

const Database = {
  _db: null,

  async open() {
    if (this._db) return this._db;
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE)) {
          db.createObjectStore(STORE, { keyPath: 'id' });
        }
      };
      req.onsuccess = (e) => { this._db = e.target.result; resolve(this._db); };
      req.onerror = () => reject(req.error);
    });
  },

  async get(id) {
    const db = await this.open();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(id);
      req.onsuccess = () => resolve(req.result?.data ?? null);
      req.onerror = () => resolve(null);
    });
  },

  async set(id, data) {
    const db = await this.open();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put({ id, data, updatedAt: Date.now() });
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
    });
  },

  async exportAll() {
    const db = await this.open();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve([]);
    });
  },

  async importAll(records) {
    const db = await this.open();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readwrite');
      const store = tx.objectStore(STORE);
      records.forEach(r => store.put(r));
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
    });
  },
};

      {day:38,title:"最終分析",tasks:["最有望銘柄のIR資料を最終確認","買う理由を3行以上で記録する","損切りラインを具体的な株価で計算し逆指値の準備をする"]},
      {day:39,title:"エントリー判断",tasks:["ブレイク条件（出来高2倍以上・ピボット+5%以内）を確認","条件が揃えば買い注文。揃っていなければ絶対に買わない","買ったら即座に逆指値（損切り注文）を設定する"]},
      {day:40,title:"保有銘柄の監視",tasks:["株価と出来高を確認。損切りラインとの距離を計算","買った時のシナリオに変化がないか確認","感情チェック：焦り・恐怖・欲が出ていないかノートに書く"]},
      {day:41,title:"トレード記録の完成",tasks:["保有継続 or 売却の判断をルールに基づいて行う","トレード記録を全項目完全に記入する","「ルールを守れたか」をYES/NOで記録する"]},
      {day:42,title:"Phase 0 完了",tasks:["6週間で学んだことの総まとめを書く","守るべきルール上位5つを優先順位付きで書き出す","「ルールを守って売買する感覚を掴む」は達成できたか自己評価"]},
  ]},
];

/* ═══════════════════════════════════════════════════
   COMPONENTS
   ═══════════════════════════════════════════════════ */
const { useState, useEffect, useCallback, useRef } = React;

function Confetti({ color }) {
  const dots = React.useMemo(() => Array.from({length:14},(_,i)=>{
    const a = (Math.random()-.5)*140, d = 25+Math.random()*50;
    return { i, x:30+Math.random()*40, cx:Math.sin(a*Math.PI/180)*d, cy:-Math.cos(a*Math.PI/180)*d, s:3+Math.random()*5, dl:Math.random()*.12, r:Math.random()*360 };
  }),[]);
  return <div className="confetti-wrap">{dots.map(p=>
    <div key={p.i} className="confetti-dot" style={{left:`${p.x}%`,top:'50%',width:p.s,height:p.s,background:color,animationDelay:`${p.dl}s`,['--cx']:`${p.cx}px`,['--cy']:`${p.cy}px`,['--cr']:`${p.r}deg`,borderRadius:p.s>5?'50%':'1px'}}/>
  )}</div>;
}

function CheckIcon() {
  return <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 7l3 3 5-6" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}
function ChevronDown() {
  return <svg width="20" height="20" viewBox="0 0 20 20" className="day-chevron"><path d="M5 8l5 5 5-5" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}

/* ═══════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════ */
function App() {
  const [state, setState] = useState({ checked:{}, startDate:null, activeWeek:0, focusDay:null });
  const [ready, setReady] = useState(false);
  const [burst, setBurst] = useState(null);
  const [menu, setMenu] = useState(false);
  const refs = useRef({});

  // Load from IndexedDB
  useEffect(()=>{
    Database.get('state').then(d=>{ if(d) setState(d); setReady(true); });
  },[]);

  // Save to IndexedDB
  const save = useCallback((s)=> Database.set('state',s), []);

  const up = (fn)=> setState(prev=>{ const next = fn(prev); save(next); return next; });

  const toggle = (wi,di,ti)=>{
    const k = `${wi}-${di}-${ti}`;
    up(prev=>{
      const next = {...prev, checked:{...prev.checked,[k]:!prev.checked[k]}};
      const allDone = SCHEDULE[wi].days[di].tasks.every((_,j)=> j===ti ? !prev.checked[k] : prev.checked[`${wi}-${di}-${j}`]);
      if(allDone){ setBurst(`${wi}-${di}`); setTimeout(()=>setBurst(null),1200); }
      return next;
    });
  };

  const openDay = (wi,di)=>{
    const k = `${wi}-${di}`;
    up(p=>({...p, focusDay: p.focusDay===k?null:k, activeWeek:wi}));
    setTimeout(()=>refs.current[k]?.scrollIntoView({behavior:'smooth',block:'start'}),100);
  };

  const isDayDone = (wi,di)=> SCHEDULE[wi].days[di].tasks.every((_,ti)=>state.checked[`${wi}-${di}-${ti}`]);
  const weekProg = (wi)=>{ let t=0,d=0; SCHEDULE[wi].days.forEach((day,di)=>day.tasks.forEach((_,ti)=>{t++;if(state.checked[`${wi}-${di}-${ti}`])d++;})); return{t,d,pct:t?Math.round(d/t*100):0}; };
  const totalProg = ()=>{ let t=0,d=0; SCHEDULE.forEach((w,wi)=>w.days.forEach((day,di)=>day.tasks.forEach((_,ti)=>{t++;if(state.checked[`${wi}-${di}-${ti}`])d++;})));return{t,d,pct:t?Math.round(d/t*100):0};};
  const curDay = state.startDate ? Math.floor((new Date()-new Date(state.startDate))/864e5)+1 : 0;
  const isDark = window.matchMedia?.('(prefers-color-scheme:dark)').matches;

  // Export data
  const exportData = async ()=>{
    const all = await Database.exportAll();
    const blob = new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`inv-tracker-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
    setMenu(false);
  };

  // Import data
  const importData = ()=>{
    const input = document.createElement('input'); input.type='file'; input.accept='.json';
    input.onchange = async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      const text = await file.text();
      const records = JSON.parse(text);
      await Database.importAll(records);
      const d = await Database.get('state');
      if(d) setState(d);
      setMenu(false);
      alert('データを復元しました');
    };
    input.click();
  };

  const resetAll = ()=>{
    if(confirm('全ての進捗をリセットしますか？この操作は元に戻せません。')){
      const fresh = {checked:{},startDate:null,activeWeek:0,focusDay:null};
      setState(fresh); save(fresh); setMenu(false);
    }
  };

  if(!ready) return <div style={{display:'flex',justifyContent:'center',alignItems:'center',height:'100dvh'}}><p style={{color:'var(--tx3)',fontSize:14}}>読み込み中...</p></div>;

  const tp = totalProg();
  const aw = state.activeWeek;
  const week = SCHEDULE[aw];
  const wp = weekProg(aw);

  return <>
    {/* Header */}
    <div style={{padding:'40px 20px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div>
        <div style={{fontSize:10,letterSpacing:5,textTransform:'uppercase',color:'var(--tx3)',marginBottom:6}}>Phase 0 — 42 days</div>
        <h1 style={{fontSize:20,fontWeight:800,letterSpacing:-.5}}>投資学習トラッカー</h1>
      </div>
      <button onClick={()=>setMenu(true)} style={{width:40,height:40,borderRadius:12,border:'1px solid var(--bd)',background:'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>
        ☰
      </button>
    </div>

    {/* Start */}
    {!state.startDate ? (
      <div style={{padding:'24px 20px 32px',textAlign:'center'}}>
        <p style={{fontSize:14,color:'var(--tx2)',marginBottom:20,lineHeight:1.7}}>毎日3つのタスクをこなすだけ。<br/>他は見ない。これだけに集中する。</p>
        <button onClick={()=>up(p=>({...p,startDate:new Date().toISOString().slice(0,10)}))} style={{background:'#E03040',color:'#fff',border:'none',borderRadius:14,padding:'16px 0',fontSize:16,fontWeight:700,width:'100%',maxWidth:320,boxShadow:'0 4px 24px rgba(224,48,64,.3)'}}>
          今日から開始する
        </button>
        <p style={{fontSize:11,color:'var(--tx3)',marginTop:12}}>タップすると今日が Day 1 になります</p>
      </div>
    ) : (
      <div style={{padding:'0 20px 12px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
          <span style={{fontSize:28,fontWeight:800,letterSpacing:-1}}>Day {Math.min(curDay,42)}</span>
          <span style={{fontSize:13,color:'var(--tx2)'}}>{tp.d}/{tp.t}</span>
        </div>
        <div style={{background:'var(--bg2)',borderRadius:6,height:8,overflow:'hidden'}}>
          <div style={{width:`${tp.pct}%`,height:'100%',background:week.accent,borderRadius:6,transition:'width .5s ease',animation:'progress-fill .8s ease',['--w']:`${tp.pct}%`}}/>
        </div>
        <div style={{fontSize:11,color:'var(--tx3)',marginTop:4,textAlign:'right'}}>{tp.pct}%</div>
      </div>
    )}

    {/* Week tabs */}
    <div className="tabs">
      {SCHEDULE.map((w,i)=>{
        const p = weekProg(i);
        return <button key={i} className={`tab ${i===aw?'active':''}`}
          onClick={()=>up(prev=>({...prev,activeWeek:i,focusDay:null}))}
          style={{
            background: i===aw ? w.accent : 'var(--bg2)',
            color: i===aw ? '#fff' : 'var(--tx2)',
            ['--shadow']: `${w.accent}40`,
          }}>
          <div>W{w.week}</div>
          {p.d>0 && <div style={{fontSize:10,marginTop:1,opacity:.85}}>{p.pct===100?'✓':`${p.pct}%`}</div>}
        </button>;
      })}
    </div>

    {/* Week header */}
    <div style={{padding:'4px 20px 12px'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:4,height:30,borderRadius:2,background:week.accent}}/>
        <div>
          <h2 style={{fontSize:16,fontWeight:800,color:week.accent,margin:0}}>{week.title}</h2>
          <p style={{fontSize:12,color:'var(--tx2)',margin:0,marginTop:2}}>{week.sub}</p>
        </div>
      </div>
      <div style={{display:'flex',gap:3,marginTop:10,marginLeft:14}}>
        {week.days.map((_,di)=>{
          const done = isDayDone(aw,di);
          const partial = week.days[di].tasks.some((__,ti)=>state.checked[`${aw}-${di}-${ti}`]);
          return <div key={di} style={{flex:1,height:4,borderRadius:2,transition:'background .4s',background:done?week.accent:partial?`${week.accent}50`:'var(--bg3)'}}/>;
        })}
      </div>
    </div>

    {/* Day cards */}
    <div style={{padding:'4px 0'}}>
      {week.days.map((day,di)=>{
        const complete = isDayDone(aw,di);
        const isToday = state.startDate && day.day===curDay;
        const fk = `${aw}-${di}`;
        const isOpen = state.focusDay===fk;
        const isBurst = burst===fk;
        const checked_n = day.tasks.filter((_,ti)=>state.checked[`${aw}-${di}-${ti}`]).length;

        return <div key={di} ref={el=>{refs.current[fk]=el;}}
          className={`day-card ${isToday?'today':''} ${complete?'done':''} ${isOpen?'open':''}`}
          style={{
            ['--accent']:week.accent,
            background: complete ? (isDark ? week.dbg : week.bg) : 'var(--bg)',
            animation: isBurst ? 'day-done .4s ease':'none',
          }}>
          {isBurst && <Confetti color={week.accent}/>}

          <div className="day-head" onClick={()=>openDay(aw,di)}>
            <div className="day-num" style={{
              background: complete ? week.accent : isToday ? `${week.accent}18` : 'var(--bg2)',
              color: complete ? '#fff' : isToday ? week.accent : 'var(--tx2)',
              ['--ring']: `${week.accent}44`,
              animation: isToday&&!complete ? 'ring-pulse 2s ease infinite':'none',
            }}>
              {complete ? <span style={{animation:'check-burst .3s ease'}}>✓</span> : day.day}
            </div>

            <div style={{flex:1,minWidth:0}}>
              <div className="day-title" style={{color:complete?week.accent:'var(--tx)'}}>{day.title}</div>
              {!isOpen && !complete && checked_n>0 && <div className="day-sub">{checked_n}/{day.tasks.length} 完了</div>}
            </div>

            {isToday && !complete && <span className="day-badge" style={{background:week.accent}}>TODAY</span>}
            <ChevronDown/>
          </div>

          {isOpen && <div className="task-list">
            {day.tasks.map((task,ti)=>{
              const k = `${aw}-${di}-${ti}`;
              const done = state.checked[k];
              return <div key={ti} className="task-row" onClick={()=>toggle(aw,di,ti)}>
                <div className={`checkbox ${done?'checked':''}`} style={{background:done?week.accent:'transparent'}}>
                  {done && <CheckIcon/>}
                </div>
                <span className={`task-text ${done?'done':''}`}>{task}</span>
              </div>;
            })}

            {complete && di < week.days.length-1 && (
              <button className="next-btn" onClick={e=>{e.stopPropagation();openDay(aw,di+1);}}
                style={{color:week.accent,borderColor:`${week.accent}40`}}>
                次へ → Day {week.days[di+1].day}：{week.days[di+1].title}
              </button>
            )}
            {complete && di===week.days.length-1 && aw < SCHEDULE.length-1 && (
              <button className="next-btn" onClick={e=>{e.stopPropagation();up(p=>({...p,activeWeek:aw+1,focusDay:`${aw+1}-0`}));}}
                style={{color:SCHEDULE[aw+1].accent,borderColor:`${SCHEDULE[aw+1].accent}40`}}>
                Week {aw+2} へ → {SCHEDULE[aw+1].title}
              </button>
            )}
          </div>}
        </div>;
      })}
    </div>

    {/* Menu sheet */}
    <div className={`menu-overlay ${menu?'open':''}`} onClick={()=>setMenu(false)}/>
    <div className={`menu-sheet ${menu?'open':''}`}>
      <div className="menu-handle"/>
      <div className="menu-item" onClick={exportData}>
        <div className="menu-icon" style={{background:'var(--bg2)'}}>💾</div>
        <div><div style={{fontWeight:600}}>データをバックアップ</div><div style={{fontSize:12,color:'var(--tx2)',marginTop:2}}>JSONファイルとしてダウンロード</div></div>
      </div>
      <div className="menu-item" onClick={importData}>
        <div className="menu-icon" style={{background:'var(--bg2)'}}>📂</div>
        <div><div style={{fontWeight:600}}>バックアップから復元</div><div style={{fontSize:12,color:'var(--tx2)',marginTop:2}}>JSONファイルを読み込む</div></div>
      </div>
      <div className="menu-item" onClick={resetAll}>
        <div className="menu-icon" style={{background:'#FEF2F2'}}>🗑</div>
        <div style={{color:'#E03040'}}><div style={{fontWeight:600}}>全データをリセット</div><div style={{fontSize:12,opacity:.7,marginTop:2}}>進捗を全て削除する</div></div>
      </div>
      <div style={{padding:'16px 8px 0',fontSize:11,color:'var(--tx3)',textAlign:'center'}}>
        v1.0 — データは端末に保存されます
      </div>
    </div>
  </>;
}

/* ═══════════════════════════════════════════════════
   MOUNT
   ═══════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
